title: Encoded / Obfuscated PowerShell Execution
id: b2000002-0000-4000-a000-ganglion0008
status: stable
description: Detects PowerShell launched with encoded/obfuscated commands (-enc, -EncodedCommand, FromBase64String, IEX download-cradle) commonly used for fileless in-memory payloads.
author: Ganglion-OOB
level: high
logsource:
  product: ganglion
  service: sentry_agent
detection:
  selection:
    event_type: powershell
  cmdline_enc:
    details.cmdline|contains:
      - ' -enc '
      - '-encodedcommand'
      - 'frombase64string'
      - 'iex(new-object'
      - 'downloadstring'
  condition: selection and cmdline_enc
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1027
